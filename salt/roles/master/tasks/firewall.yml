---
# tasks/firewall.yml
# Opens UFW ports for salt-master and the nginx/salt-api HTTPS port.

- name: Allow salt-master ZeroMQ ports through ufw
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "4505"
    - "4506"
  tags: [firewall, salt_master]

- name: Allow nginx HTTPS port through ufw
  ufw:
    rule: allow
    port: "{{ salt_api_nginx_listen_port | string }}"
    proto: tcp
  tags: [firewall, nginx, salt_api]
