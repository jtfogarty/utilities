---
# tasks/configure_nginx.yml
# Configures the nginx reverse proxy for salt-api.
# Run standalone (with salt_master_already_installed: true) to only
# reconfigure/restart nginx without touching the full install.

# ──────────────────────────────────────────────────────────────────────────────
# SSL directory
# ──────────────────────────────────────────────────────────────────────────────

- name: Ensure /etc/ssl/private exists and has correct permissions
  file:
    path: /etc/ssl/private
    state: directory
    owner: root
    group: ssl-cert
    mode: "0710"
  tags: [configure, nginx, ssl]

# ──────────────────────────────────────────────────────────────────────────────
# nginx virtual host for salt-api
# ──────────────────────────────────────────────────────────────────────────────

- name: Deploy nginx salt-api virtual host config
  template:
    src: salt-api-nginx.conf.j2
    dest: /etc/nginx/sites-available/salt-api.conf
    owner: root
    group: root
    mode: "0644"
  notify:
    - Restart nginx
  tags: [configure, nginx]

- name: Enable nginx salt-api virtual host
  file:
    src: /etc/nginx/sites-available/salt-api.conf
    dest: /etc/nginx/sites-enabled/salt-api.conf
    state: link
  notify:
    - Restart nginx
  tags: [configure, nginx]

- name: Remove nginx default site (avoid port conflicts)
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify:
    - Restart nginx
  tags: [configure, nginx]

# ──────────────────────────────────────────────────────────────────────────────
# Enable and start nginx
# ──────────────────────────────────────────────────────────────────────────────

- name: Ensure nginx is enabled and running
  service:
    name: nginx
    state: started
    enabled: true
  tags: [service, nginx]
